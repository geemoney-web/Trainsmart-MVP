services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: trainsmart
      POSTGRES_PASSWORD: trainsmart
      POSTGRES_DB: trainsmart
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trainsmart"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
